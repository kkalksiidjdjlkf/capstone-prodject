paths:
  cache_dir: "/app/cache"

model:
  embedding_model_hf: "bge-m3:latest"
  rerank_model: "BAAI/bge-reranker-v2-m3"
  device: "cpu"

processing:
  batch_size_embeddings: 32
  batch_size_reranking: 16

retrieval:
  llamafile_server_base_url: "http://host.docker.internal:11434"
  send_nb_chunks_to_llm: 12
  use_bm25: true
  bm25_weight: 0.7
  top_k: 30
  use_reranking: true
  use_query_expansion: true
  rerank_model: "BAAI/bge-reranker-v2-m3"

fusion:
  enabled: true
  num_variants: 3
  rrf_k: 60
  translation_enabled: true
  paraphrase_enabled: false  # Disabled for now, can be enabled later



